<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Authentication UI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #141e30, #243b55);
        }

        .container {
            width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #ddd;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 13px;
            border: none;
            outline: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 14px;
        }

        .input-group input::placeholder {
            color: #ddd;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 13px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .login-btn {
            background: #00c6ff;
            color: white;
        }

        .signup-btn {
            background: transparent;
            border: 2px solid white;
            color: white;
        }

        .login-btn:hover,
        .signup-btn:hover,
        .submit-btn:hover,
        .logout-btn:hover {
            transform: scale(1.03);
        }

        .submit-btn {
            width: 100%;
            background: #00c6ff;
            color: white;
            margin-top: 10px;
        }

        .logout-btn {
            background: white;
            color: #243b55;
            margin-top: 20px;
            width: 100%;
        }

        .hidden {
            display: none;
        }

        .welcome-screen {
            text-align: center;
        }

        .welcome-screen h2 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .welcome-screen p {
            color: #ddd;
            font-size: 16px;
        }

    </style>
</head>

<body>

    <div class="container">

        <!-- LOGIN PAGE -->

        <div id="loginPage">

            <h1>Welcome Back</h1>

            <p class="subtitle">
                Login to continue
            </p>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Enter email">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>

            <div class="button-group">

                <button class="login-btn" onclick="login()">
                    Login
                </button>

                <button class="signup-btn" onclick="showSignup()">
                    Sign Up
                </button>

            </div>

        </div>

        <!-- SIGNUP PAGE -->

        <div id="signupPage" class="hidden">

            <h1>Create Account</h1>

            <p class="subtitle">
                Signup to get started
            </p>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter full name">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="Enter email">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Enter password">
            </div>

            <div class="input-group">
                <label>Phone</label>
                <input type="tel" id="phone" placeholder="Enter phone number">
            </div>

            <button class="submit-btn" onclick="signup()">
                Create Account
            </button>

        </div>

        <!-- WELCOME PAGE -->

        <div id="welcomePage" class="hidden welcome-screen">

            <h2 id="welcomeText"></h2>

            <p>
                Successfully logged in to the application
            </p>

            <button class="logout-btn" onclick="logout()">
                Logout
            </button>

        </div>

    </div>

    <script>

        let storedUser = {};

        function showSignup() {

            document.getElementById("loginPage").classList.add("hidden");
            document.getElementById("signupPage").classList.remove("hidden");

        }

        function signup() {

            storedUser.name = document.getElementById("fullName").value;
            storedUser.email = document.getElementById("signupEmail").value;
            storedUser.password = document.getElementById("signupPassword").value;
            storedUser.phone = document.getElementById("phone").value;

            alert("Signup Successful! Please Login");

            document.getElementById("signupPage").classList.add("hidden");
            document.getElementById("loginPage").classList.remove("hidden");

        }

        function login() {

            let email = document.getElementById("loginEmail").value;
            let password = document.getElementById("loginPassword").value;

            if (email === storedUser.email &&
                password === storedUser.password) {

                document.getElementById("loginPage").classList.add("hidden");

                document.getElementById("welcomePage").classList.remove("hidden");

                document.getElementById("welcomeText").innerHTML =
                    "Hey Welcome, " + storedUser.name + " 👋";

            } else {

                alert("Invalid Email or Password");

            }

        }

        function logout() {

            document.getElementById("welcomePage").classList.add("hidden");

            document.getElementById("loginPage").classList.remove("hidden");

        }

    </script>

</body>

</html>
